    <style>
        @-webkit-keyframes fade-in-top {
            0% {
                -webkit-transform: translateY(-50px);
                transform: translateY(-50px);
                opacity: 0
            }

            100% {
                -webkit-transform: translateY(0);
                transform: translateY(0);
                opacity: 1
            }
        }

        @keyframes fade-in-top {
            0% {
                -webkit-transform: translateY(-50px);
                transform: translateY(-50px);
                opacity: 0
            }

            100% {
                -webkit-transform: translateY(0);
                transform: translateY(0);
                opacity: 1
            }
        }

        .fade-in-top {
            -webkit-animation: fade-in-top .6s cubic-bezier(.39, .575, .565, 1.000) both;
            animation: fade-in-top .6s cubic-bezier(.39, .575, .565, 1.000) both
        }

        /* --- Color Palette Matching Lemi Rose --- */
        :root {
            --bg-color: #F4BBCADD;
            /* Soft cream background */
            --bg-white: #FFFFFFDD;
            /* Soft cream background */
            --primary-pink: #FF8DA1;
            /* Main hair/dress pink */
            --dark-pink: #D64670;
            /* Boot laces/darker accents */
            --pastel-yellow: #FCE4A8;
            /* Skirt yellow */
            --white: #FFFFFF;
            --text-dark: #4A323A;
            /* Soft dark brown/pink for text readability */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: url("/.netlify/images?url=/images/icons8-teddy-bear-48.png"), auto;
        }

        body {
            /* Accurately applying Mozilla Text */
            font-family: 'National Park', sans-serif;
            background-color: var(--dark-pink);
            background-image: url("/.netlify/images?url=/images/lemirose.jpeg");

            background-size: cover;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            min-height: 100vh;
            padding: 100px;
        }

        .container {
            background-color: var(--white);
            max-width: 400px;
            width: 100%;
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(214, 70, 112, 0.15);
            border: 3px solid var(--primary-pink);
            box-shadow: -3px 3px 0 var(--text-dark);
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: var(--pastel-yellow);
            border: 4px solid var(--primary-pink);
            margin: 0 auto 15px auto;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(255, 141, 161, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The actual image */
        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 2.8rem;
            color: var(--dark-pink);
            margin-bottom: 5px;
            letter-spacing: 1px;
            font-weight: normal;
        }

        .bio {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: var(--text-dark);
            font-weight: 500;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            background-color: var(--primary-pink);
            color: var(--white);
            padding: 15px 20px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            /* Making use of Mozilla Text's bolder weights */
            transition: all 0.3s ease;
            border: 2px solid transparent;
            box-shadow: 0 4px 0 var(--dark-pink);
            cursor: url("/.netlify/images?url=/images/icons8-lemon-48.png"), auto;
        }

        .link-btn:hover {
            background-color: var(--pastel-yellow);
            color: var(--dark-pink);
            border: 2px solid var(--dark-pink);
            box-shadow: 0 4px 0 var(--primary-pink);
            transform: translateY(-2px);
        }

        .link-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 transparent;
        }

        .decor {
            margin-top: 25px;
            font-size: 1.5rem;
            color: var(--primary-pink);
        }

        @media (max-width: 820px) {
            body {
                padding: 20px;
                align-items: end;
                background-position: center;
            }
        }
    </style>
</head>

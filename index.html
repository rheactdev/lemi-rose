<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemi Rose | Links</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Mozilla+Text:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- Color Palette Matching Lemi Rose --- */
        :root {
            --bg-color: #FDF3E3;       /* Soft cream background */
            --primary-pink: #FF8DA1;   /* Main hair/dress pink */
            --dark-pink: #D64670;      /* Boot laces/darker accents */
            --pastel-yellow: #FCE4A8;  /* Skirt yellow */
            --white: #FFFFFF;
            --text-dark: #4A323A;      /* Soft dark brown/pink for text readability */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Accurately applying Mozilla Text */
            font-family: 'Mozilla Text', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--primary-pink) 1px, transparent 1px);
            background-size: 30px 30px; /* Cute polka dot background */
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--white);
            max-width: 400px;
            width: 100%;
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(214, 70, 112, 0.15);
            border: 3px solid var(--pastel-yellow);
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: var(--pastel-yellow);
            border: 4px solid var(--primary-pink);
            margin: 0 auto 15px auto;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(255, 141, 161, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The actual image */
        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 2.8rem;
            color: var(--dark-pink);
            margin-bottom: 5px;
            letter-spacing: 1px;
            font-weight: normal;
        }

        .bio {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: var(--text-dark);
            font-weight: 500;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: block;
            text-decoration: none;
            background-color: var(--primary-pink);
            color: var(--white);
            padding: 15px 20px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600; /* Making use of Mozilla Text's bolder weights */
            transition: all 0.3s ease;
            border: 2px solid transparent;
            box-shadow: 0 4px 0 var(--dark-pink);
        }

        .link-btn:hover {
            background-color: var(--pastel-yellow);
            color: var(--dark-pink);
            border: 2px solid var(--dark-pink);
            box-shadow: 0 4px 0 var(--primary-pink);
            transform: translateY(-2px);
        }

        .link-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 transparent;
        }

        .decor {
            margin-top: 25px;
            font-size: 1.5rem;
            color: var(--primary-pink);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-pic">
            <img src="Adoptable 4 citrus.png" alt="Lemi Rose" onerror="this.style.display='none'">
        </div>

        <h1>Lemi Rose</h1>
        
        <p class="bio">Otome / BL / Horror / Cozy</p>

        <div class="links-container">
            <a href="#" class="link-btn"><img width="24" height="24" src="https://img.icons8.com/material/24/FFFFFF/bluesky.png" alt="bluesky"/>BlueSky</a>
            <a href="#" class="link-btn"><img width="24" height="24" src="https://img.icons8.com/material/24/FFFFFF/twitch.png" alt="twitch"/>Twitch</a>
        </div>

        <div class="decor">
            ✿ ❀ ✿
        </div>
    </div>

</body>
</html>
